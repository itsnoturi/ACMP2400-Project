name: Build-Curl
on:
  workflow_dispatch
permissions: {}
jobs:
  build-and-curl:
    runs-on: ubuntu-latest
    steps:
      - name: get_code
        uses: actions/checkout@v4
      - name: docker_build
        run: |
          docker build -t pipeline-test .
      - name: docker_run
        run: |
          docker run -d -p 8000:8000 -e DJANGO_SECRET_KEY=devpassworddontuseme pipeline-test
      - name: curl
        run: |
          curl -f http://localhost:8000/
