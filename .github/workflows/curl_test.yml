name: Build-Curl

on:
  workflow_dispatch

permissions: {}

jobs:
  build-and-curl:
    runs-on: ubuntu-latest
    steps:
      - name: get_code
        uses: actions/checkout@v4

      - name: docker_build
        run: |
          docker build -t pipeline-test .

      - name: docker_run
        run: |
          docker run -d -p 8000:8000 -e DJANGO_SECRET_KEY=devpassworddontuseme pipeline-test

      - name: curl
        run: |
          sleep 10
          curl -f http://localhost:8000/

  sbom-scan-and-test:
    runs-on: ubuntu-latest
    needs: build-and-curl
    steps:
      - name: get_code
        uses: actions/checkout@v4

      - name: sbom_gen_and_scan
        uses: ./.github/actions/sbom-scan

      - name: upload_sbom
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: project-sbom
          path: sbom.json
          compression-level: 9

  terraform-stage-1:
    needs: [build-and-curl, sbom-scan-and-test]
    runs-on: ubuntu-latest
    steps:
      - name: get_code
        uses: actions/checkout@v4

      - name: terraform-stage-1
        uses: ./.github/actions/terraform
        with:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          STATE_KEY: curidil
          TF_STAGE: t1

  build-tag-push:
    needs: terraform-stage-1
    runs-on: ubuntu-latest
    steps:
      - name: get_code
        uses: actions/checkout@v4

      - name: acr_login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: acrcuridilacmp2400.azurecr.io
          username: ${{ secrets.ARM_CLIENT_ID }}
          password: ${{ secrets.ARM_CLIENT_SECRET }}

      - name: docker_build_tag_push
        run: |
          docker build -t application-final .
          docker tag application-final acrcuridilacmp2400.azurecr.io/final
          docker push acrcuridilacmp2400.azurecr.io/final

  tf-stage-2:
    needs: build-tag-push
    runs-on: ubuntu-latest
    steps:
      - name: get_code
        uses: actions/checkout@v4

      - name: terraform-stage-2
        uses: ./.github/actions/terraform
        with:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          STATE_KEY: curidil
          TF_STAGE: t2
          DJANGO_SECRET_KEY_PROD: ${{ secrets.DJANGO_SECRET_KEY_PROD }}

  pre-eval:
    needs: tf-stage-2
    runs-on: ubuntu-latest
    steps:
      - name: get_code
        uses: actions/checkout@v4

      - name: get_container_dns
        run: |
          cd t2
          prefix=$(grep 'dns_name_label' main.tf | cut -d '=' -f2 | tr -d '"' | xargs)
          sleep 50
          curl -f http://$prefix.centralus.azurecontainer.io:8000

  stage3-the-destroyer:
    needs: pre-eval
    runs-on: ubuntu-latest
    steps:
      - name: get_code
        uses: actions/checkout@v4

      - name: setup terraform
        uses: hashicorp/setup-terraform@v3


      - name: destroy_t2
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          TF_VAR_ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          TF_VAR_ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          TF_VAR_DJANGO_SECRET_KEY_PROD: ${{ secrets.DJANGO_SECRET_KEY_PROD }}
        run: |
          cd t2
          terraform init -backend-config="key=curidil.tfstate"
          terraform destroy -auto-approve
