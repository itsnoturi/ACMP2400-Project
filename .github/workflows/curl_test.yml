name: Build-Curl
on:
  workflow_dispatch
permissions: {}
jobs:
  build-and-curl:
    runs-on: ubuntu-latest
    steps:
      - name: get_code
        uses: actions/checkout@v4
      - name: docker_build
        run: |
          docker build -t pipeline-test .
      - name: docker_run
        run: |
          docker run -d -p 8000:8000 -e DJANGO_SECRET_KEY=devpassworddontuseme pipeline-test
      - name: curl
        run: |
          sleep 10
          curl -f http://localhost:8000/
  sbom-scan-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: get_code
        uses: actions/checkout@v4
      - name: sbom_gen_and_scan
        uses: ./.github/actions/sbom-scan
      - name: upload_sbom
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: project-sbom
          path: sbom.json
          compression-level: 9
